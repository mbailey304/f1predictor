name: Update F1 Predictions

on:
  workflow_dispatch:
    inputs:
      year:
        description: "Season year"
        required: false
        default: "2026"
      round:
        description: "Round number (leave as 0 to auto-detect)"
        required: false
        default: "0"
      stage:
        description: "Optional manual stage label"
        required: false
        default: ""
  schedule:
    - cron: "0 * * * *"

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh official results
        run: |
          python src/ingest.py

      - name: Detect current round if needed
        id: detect_round
        run: |
          if [ "${{ github.event.inputs.round }}" = "0" ] || [ -z "${{ github.event.inputs.round }}" ]; then
            ROUND=$(python src/detect_round.py)
            echo "round=$ROUND" >> $GITHUB_OUTPUT
          else
            echo "round=${{ github.event.inputs.round }}" >> $GITHUB_OUTPUT
          fi

      - name: Refresh practice data
        run: |
          python src/ingest_practice.py ${{ github.event.inputs.year || '2026' }} ${{ steps.detect_round.outputs.round }}

      - name: Update weekend predictions
        run: |
          if [ -z "${{ github.event.inputs.stage }}" ]; then
            python src/update_weekend.py ${{ github.event.inputs.year || '2026' }} ${{ steps.detect_round.outputs.round }}
          else
            python src/update_weekend.py ${{ github.event.inputs.year || '2026' }} ${{ steps.detect_round.outputs.round }} "${{ github.event.inputs.stage }}"
          fi

      - name: Commit updated outputs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add outputs/ data/raw/ models/
          git diff --cached --quiet || git commit -m "Auto-update predictions"
          git push